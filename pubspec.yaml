name: doda
description: DoDa - Bilingual Learning App for Kids (English + Kinyarwanda)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Audio
  audioplayers: ^6.6.0

  # Local storage
  shared_preferences: ^2.5.5

  # State management
  provider: ^6.1.4

  # Animations
  lottie: ^3.3.2

  # SVG rendering
  flutter_svg: ^2.2.4

  # Fonts
  google_fonts: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    # Data files (always present)
    - assets/data/
    # Audio and image directories — uncomment as you add files
    - assets/audio/en/letters/
    # - assets/audio/rw/letters/
    # - assets/audio/en/words/
    # - assets/audio/rw/words/
    - assets/audio/rewards/
    - assets/audio/en/numbers/
    - assets/audio/background/
    # - assets/images/words/
    - assets/images/ui/

  # Fonts served via google_fonts package (no local ttf files needed)

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ui/logo.png"
  min_sdk_android: 21
