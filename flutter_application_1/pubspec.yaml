name: doda
description: DoDa - Bilingual Learning App for Kids (English + Kinyarwanda)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Audio
  audioplayers: ^5.2.1

  # Local storage
  shared_preferences: ^2.2.2

  # State management
  provider: ^6.1.1

  # Animations
  lottie: ^3.0.0

  # Fonts
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    # Data files (always present)
    - assets/data/
    # Audio and image directories — uncomment as you add files
    # - assets/audio/en/letters/
    # - assets/audio/rw/letters/
    # - assets/audio/en/words/
    # - assets/audio/rw/words/
    # - assets/audio/rewards/
    # - assets/images/words/
    # - assets/images/ui/

  # Fonts served via google_fonts package (no local ttf files needed)
